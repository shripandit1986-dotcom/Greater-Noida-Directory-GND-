<!DOCTYPE html>
<html>
<head>
    <title>Payment - GND Directory</title>
    <style>
        body {
            font-family: Arial;
            background: #f5f5f5;
            text-align: center;
            padding: 50px;
        }

        .box {
            background: white;
            padding: 30px;
            width: 350px;
            margin: auto;
            border-radius: 10px;
            box-shadow: 0px 0px 10px #ccc;
        }

        .btn {
            background: green;
            color: white;
            padding: 12px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 20px;
        }

        .price {
            font-size: 22px;
            color: #333;
            margin: 15px 0;
        }
    </style>
</head>

<body>

<div class="box">
    <h2>Complete Payment</h2>
    
    <p>Activate your business listing</p>

    <div class="price">₹1</div>

    <form method="POST" action="/payment-success">
        <button class="btn" type="submit">
            Pay Now
        </button>
    </form>
</div>

</body>
</html>
